[build]
  command = "npm run build"
  functions = "dist/functions"
  publish = "dist/public"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
